model:
  provider: openai-compat
  name: nous-hermes3

backend:
  default: ollama
  temperature: 0.3          # more variation for creative hint generation
  max_iterations: 50        # generous limit — practice sessions explore broadly

skills:
  load:
    - SKILL-web
    - SKILL-crypto
    - SKILL-binary
    - SKILL-forensics
    - SKILL-osint
    - SKILL-recon
    - SKILL-misc
    - SKILL-feedback
  evolution:
    enabled: true
    auto_capture: true
    trigger_tool_calls: 3   # capture patterns earlier — learning sessions are rich
  curator:
    enabled: true
    interval_days: 7

workspace:
  dir: ./workspace

memory:
  enabled: true
  backend: local

logging:
  level: debug              # verbose for learning — helps user see what's happening
  file: ~/.ctf-agent/profiles/ctf-practice/logs/agent.log
